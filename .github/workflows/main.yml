name: Deploy to Firebase

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm ci
        working-directory: functions

      - run: npm run build

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Configure Firebase function secrets
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          umask 077
          printf "%s" "$AWS_ACCESS_KEY_ID" > aws-access-key-id.txt
          printf "%s" "$AWS_SECRET_ACCESS_KEY" > aws-secret-access-key.txt
          firebase functions:secrets:set AWS_ACCESS_KEY_ID --project wanderlust-gallery --data-file aws-access-key-id.txt
          firebase functions:secrets:set AWS_SECRET_ACCESS_KEY --project wanderlust-gallery --data-file aws-secret-access-key.txt
          rm aws-access-key-id.txt aws-secret-access-key.txt

      - name: Deploy Firebase
        run: firebase deploy --project wanderlust-gallery --only hosting,firestore,functions
